<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Party Pulse</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="fx"></canvas>
  <div id="bg-pulse"></div>

  <div id="app">
    <!-- Top Bar -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <div class="logo-ring" id="logo-ring"><div class="logo-dot"></div></div>
          <span class="logo-text">PARTY PULSE</span>
        </div>
      </div>
      <div class="header-center">
        <div class="transport">
          <button id="play-btn" class="transport-btn active" title="Space">
            <svg id="pause-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            <svg id="play-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none"><polygon points="6,3 20,12 6,21"/></svg>
          </button>
          <div class="bpm-control">
            <button id="bpm-down" class="bpm-btn">&minus;</button>
            <div class="bpm-display"><span id="bpm-val">128</span><span class="bpm-unit">BPM</span></div>
            <button id="bpm-up" class="bpm-btn">+</button>
          </div>
          <div class="swing-knob" title="Randomize pattern">
            <button id="random-btn" class="transport-btn">&#9886;</button>
          </div>
          <button id="clear-btn" class="transport-btn" title="Clear">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
          </button>
        </div>
      </div>
      <div class="header-right">
        <!-- New Guide Toggle -->
        <div class="guide-toggle">
          <span class="guide-label">GUIDE</span>
          <label class="switch">
            <input type="checkbox" id="guide-switch">
            <span class="slider"></span>
          </label>
        </div>
        <div class="stats-group">
          <div class="stat">
            <span class="stat-label">SCORE</span>
            <span class="stat-value" id="score-val">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">COMBO</span>
            <span class="stat-value combo-val" id="combo-val">0<span class="combo-x">x</span></span>
          </div>
        </div>
      </div>
    </header>

    <!-- Energy Bar -->
    <div id="energy-bar-container">
      <div id="energy-bar">
        <div id="energy-fill"></div>
        <div id="energy-glow"></div>
      </div>
      <span id="energy-label">0%</span>
    </div>

    <!-- Main Content -->
    <div id="main">
      <!-- Track Labels -->
      <aside id="labels"></aside>

      <!-- Grid -->
      <div id="grid-wrap">
        <div id="step-numbers"></div>
        <div id="grid-container">
          <div id="grid"></div>
          <div id="playhead"><div class="playhead-line"></div></div>
        </div>
      </div>

      <!-- Studio Assistant Panel -->
      <aside id="assistant" class="hidden">
        <div class="assistant-header">
          <span class="assistant-icon">✨</span>
          <h3>Studio Guide</h3>
        </div>
        <div class="assistant-content">
          <p id="assistant-hint">Waiting for input...</p>
          <div id="assistant-reason" class="assistant-reason"></div>
        </div>
      </aside>
    </div>

    <!-- Bottom -->
    <footer id="footer">
      <div class="footer-left">
        <div class="presets">
          <button class="preset-btn active" data-preset="0"><span class="preset-num">1</span></button>
          <button class="preset-btn" data-preset="1"><span class="preset-num">2</span></button>
          <button class="preset-btn" data-preset="2"><span class="preset-num">3</span></button>
        </div>
      </div>
      <div class="footer-center">
        <canvas id="waveform" height="50"></canvas>
      </div>
      <div class="footer-right">
        <span class="hint">click cells &bull; drag to paint &bull; click labels to mute</span>
      </div>
    </footer>
  </div>

  <!-- Achievement Toasts -->
  <div id="toast-container"></div>

  <!-- Score popups -->
  <div id="score-popups"></div>

  <script src="app.js"></script>
</body>
</html>
